<html lang="en" class="dark" data-accent="blue">

    <meta charset="UTF-8" />

    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              dark: {
                bg: '#000000',
                surface: '#09090b',
                elevated: '#18181b',
                border: 'rgba(255,255,255,0.06)'
              },
              blue: {
                50: 'var(--primary-50)',
                100: 'var(--primary-100)',
                500: 'var(--primary-500)',
                600: 'var(--primary-600)',
                700: 'var(--primary-700)',
                900: 'var(--primary-900)'
              }
            },
            boxShadow: {
              'premium': '0 20px 50px -12px rgba(0, 0, 0, 0.5)',
              'glow': '0 0 20px -5px rgba(var(--primary-600-rgb), 0.3)'
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Roboto:wght@400;700&family=Poppins:wght@400;700&family=Merriweather:wght@400;700&family=Playfair+Display:wght@400;700&family=Open+Sans:wght@400;700&family=Lato:wght@400;700&family=Montserrat:wght@400;700&family=Oswald:wght@400;700&family=Raleway:wght@400;700&family=Nunito:wght@400;700&family=Ubuntu:wght@400;700&family=Rubik:wght@400;700&family=Mukta:wght@400;700&family=Kanit:wght@400;700&family=Anton&family=Cabin:wght@400;700&family=Fira+Sans:wght@400;700&family=Inconsolata:wght@400;700&family=Quicksand:wght@400;700&family=Work+Sans:wght@400;700&family=Crimson+Text:wght@400;700&family=DM+Sans:wght@400;700&family=PT+Sans:wght@400;700&family=PT+Serif:wght@400;700&family=Lora:wght@400;700&family=Dancing+Script&family=Pacifico&family=Satisfy&family=Parisienne&family=Cookie&family=Great+Vibes&family=Alex+Brush&family=Allura&family=Rochester&family=Sacramento&family=Yellowtail&display=swap" rel="stylesheet">
    <style>
      :root {
        --primary-50: #eff6ff;
        --primary-100: #dbeafe;
        --primary-500: #3b82f6;
        --primary-600: #2563eb;
        --primary-700: #1d4ed8;
        --primary-900: #1e3a8a;
        --primary-600-rgb: 37, 99, 235;
      }

      [data-accent="indigo"] {
        --primary-50: #eef2ff;
        --primary-100: #e0e7ff;
        --primary-500: #6366f1;
        --primary-600: #4f46e5;
        --primary-700: #4338ca;
        --primary-900: #312e81;
        --primary-600-rgb: 79, 70, 229;
      }

      [data-accent="rose"] {
        --primary-50: #fff1f2;
        --primary-100: #ffe4e6;
        --primary-500: #f43f5e;
        --primary-600: #e11d48;
        --primary-700: #be123c;
        --primary-900: #881337;
        --primary-600-rgb: 225, 29, 72;
      }

      [data-accent="emerald"] {
        --primary-50: #ecfdf5;
        --primary-100: #d1fae5;
        --primary-500: #10b981;
        --primary-600: #059669;
        --primary-700: #047857;
        --primary-900: #064e3b;
        --primary-600-rgb: 5, 150, 105;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: #f8fafc;
        color: #0f172a;
        transition: background-color 0.3s ease, color 0.3s ease;
      }
      
      .dark body {
        background-color: #000000 !important;
        color: #ffffff !important;
      }

      /* Unified Surface Mapping - Relaxed to allow Tailwind opacity modifiers */
      .dark .bg-white { background-color: #0a0a0a !important; }
      .dark .bg-slate-50, .dark .bg-slate-100 { background-color: #000000 !important; }
      .dark .bg-slate-200 { background-color: #1c1c1e !important; }
      
      /* Neutral Typography for Dark Mode */
      .dark .text-slate-900, .dark .text-slate-800 { color: #f4f4f5 !important; }
      .dark .text-slate-700, .dark .text-slate-600 { color: #d4d4d8 !important; }
      .dark .text-slate-500 { color: #a1a1aa !important; }
      .dark .text-slate-400 { color: #71717a !important; }

      /* Border Normalization */
      .dark .border, .dark .border-slate-100, .dark .border-slate-200, .dark .border-slate-300 {
        border-color: rgba(255, 255, 255, 0.08) !important;
      }

      /* Dynamic Shadow System */
      .dark .shadow-sm, .dark .shadow-md, .dark .shadow-lg, .dark .shadow-xl {
        box-shadow: 0 10px 40px -10px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(255, 255, 255, 0.05) !important;
      }

      .shadow-primary { box-shadow: 0 10px 25px -5px rgba(var(--primary-600-rgb), 0.4); }
      .dark .shadow-primary { box-shadow: 0 15px 35px -10px rgba(var(--primary-600-rgb), 0.5) !important; }

      .dark .bg-blue-50 { background-color: rgba(var(--primary-600-rgb), 0.08) !important; }
      
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      .dark ::-webkit-scrollbar-track { background: #000000; }
      ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
      .dark ::-webkit-scrollbar-thumb { background: #27272a; }

      @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
      .animate-in.fade-in { animation: fade-in 0.3s ease-out; }
      .scrollbar-hide::-webkit-scrollbar { display: none; }
    </style>
